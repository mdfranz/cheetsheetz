{
  "options": {
    "config_plugin": "filesystem",
    "logger_plugin": "filesystem",
    "events_expiry": "3600",
    "disable_events": "false",
    "disable_audit": "false",
    "audit_allow_config": "true",
    "host_identifier": "hostname",
    "schedule_splay_percent": 10
  },
  "schedule": {
    "system_info": {
      "query": "SELECT hostname, cpu_brand, physical_memory FROM system_info;",
      "interval": 3600
    },
    "process_events": {
      "query": "SELECT * FROM process_events;",
      "interval": 1
    },
    "all_processes": {
      "query": "SELECT p.*, u.username, pp.name AS parent_name FROM processes p LEFT JOIN users u ON p.uid = u.uid LEFT JOIN processes pp ON p.parent = pp.pid;",
      "interval": 1
    },
    "active_processes": {
      "query": "SELECT p.pid, p.name, p.path, p.parent, pp.name AS parent_name, u.username, l.address, l.port FROM processes p LEFT JOIN users u ON p.uid = u.uid LEFT JOIN processes pp ON p.parent = pp.pid LEFT JOIN listening_ports l ON p.pid = l.pid;",
      "interval": 1 
     },
    "listening_ports": {
      "query": "SELECT pid, port, address, path FROM listening_ports WHERE port != 0;",
      "interval": 300,
      "snapshot": true,
      "description": "A snapshot of all listening ports every 5 minutes."
    },
    "suspicious_process_envs": {
      "query": "SELECT pe.pid, pe.key, pe.value, p.name, p.path FROM process_envs pe JOIN processes p USING (pid) WHERE pe.key IN ('LD_PRELOAD', 'PYTHONPATH', 'LD_LIBRARY_PATH');",
      "interval": 60,
      "description": "Monitor for suspicious environment variables every minute."
    },
    "shell_history": {
      "query": "SELECT * FROM shell_history;",
      "interval": 10 
    },
    "installed_packages": {
      "query": "SELECT name, version, source FROM deb_packages;",
      "interval": 3600
    },
    "net_processes": {
      "query": "SELECT p.pid, p.name, pos.local_address, pos.local_port, pos.remote_address, pos.remote_port, pos.state FROM processes p JOIN process_open_sockets pos ON p.pid = pos.pid WHERE pos.remote_address != '0.0.0.0' AND pos.remote_address != '::' AND pos.remote_address != '';",
      "interval": 3 
    },
    "behavioral_reverse_shell": {
      "query": "SELECT DISTINCT(processes.pid), processes.parent, processes.name, processes.path, processes.cmdline, processes.cwd, processes.root, processes.uid, processes.gid, processes.start_time, process_open_sockets.remote_address, process_open_sockets.remote_port, (SELECT cmdline FROM processes AS parent_cmdline WHERE pid=processes.parent) AS parent_cmdline FROM processes JOIN process_open_sockets USING (pid) LEFT OUTER JOIN process_open_files ON processes.pid = process_open_files.pid WHERE (name='sh' OR name='bash') AND remote_address NOT IN ('0.0.0.0', '::', '') AND remote_address NOT LIKE '10.%' AND remote_address NOT LIKE '192.168.%';",
      "interval": 600,
      "description": "Find shell processes that have open sockets"
    }
  },
  "decorators": {
    "load": [
      "SELECT uuid AS host_uuid FROM system_info;",
      "SELECT user AS username FROM logged_in_users ORDER BY time DESC LIMIT 1;"
    ]
  },
